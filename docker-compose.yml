version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medisalud-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medisalud}
      POSTGRES_USER: ${POSTGRES_USER:-medisalud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medisalud} -d ${POSTGRES_DB:-medisalud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medisalud-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-medisalud}
      DB_USERNAME: ${POSTGRES_USER:-medisalud}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-medisalud}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
